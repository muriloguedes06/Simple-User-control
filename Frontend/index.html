<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portfolio login</title>
        <link rel="stylesheet" href="./assets/css/home.css">
    </head>
    <body>
        <script src="./assets/js/home.js"></script>
        <div class="container">
            <div class="box">
                <form id="login-form" class="form active">
                    <h2>Login</h2>
                    <input id="login-email" type="email" placeholder="Email">
                    <input id="login-password" type="password" placeholder="Senha">
                    <button type="button" onclick="login()">Entrar</button>
                    <p onclick="toggleForm()">Criar conta</p>
                </form>

                <form id="register-form" class="form">
                    <h2>Registrar</h2>
                    <input id="register-user" type="text" placeholder="Usuário">
                    <input id="register-email" type="email" placeholder="Email">
                    <input id="register-password" type="password" placeholder="Senha">
                    <button type="button" onclick="register()">Cadastrar</button>
                    <p onclick="toggleForm()">Já tenho conta</p>
                </form>

            </div>
        </div>
        <script src="./assets/js/authenticator.js"></script>
    </body>
</html>
